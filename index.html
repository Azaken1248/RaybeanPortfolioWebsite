<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!--
      Two marks on purpose. Ray's chibi is line art, and its strokes fall below
      a pixel when scaled to a 32px tab, where it turns to grey mush. So the tab
      gets a Poppins "R" matching the wordmark, and the full chibi is kept for
      the 180px home-screen icon, where it reads perfectly.
    -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&family=Poppins:wght@600;700&display=swap"
      rel="stylesheet"
    />

    <title>Raybean — Graphic Designer &amp; Illustrator</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
