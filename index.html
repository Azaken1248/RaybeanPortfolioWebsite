<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!--
      Theme-aware favicon: the plain mark on the light tab bars most browsers
      use, the inverted mark on dark ones. The default (no media) covers
      browsers that ignore the media attribute.
    -->
    <link rel="icon" type="image/png" href="/favicon-32.png" />
    <link
      rel="icon"
      type="image/png"
      href="/favicon-32-inverted.png"
      media="(prefers-color-scheme: light)"
    />
    <link
      rel="icon"
      type="image/png"
      href="/favicon-32.png"
      media="(prefers-color-scheme: dark)"
    />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&family=Poppins:wght@600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Social-embed + title tags are baked in here from portfolio.ts by vite.config.ts -->
    <!--seo-->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
