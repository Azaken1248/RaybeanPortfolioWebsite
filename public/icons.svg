  <!--
    Icons that Phosphor does not ship. Resolved by name through
    src/content/iconRegistry.ts, exactly like the Phosphor icons are.

    Everything here uses currentColor, so a mark works on a light card and
    inverted on the dark ink button without a second asset.

    bluesky  - the real Bluesky butterfly.
    osu      - Ray's osu! wordmark, vector-traced from the supplied PNG.
    resume   - supplied by Ray.
    chevron-down - supplied by Ray.
    pixiv / vgen - stand-in marks; drop the official paths in and they swap.
  -->

